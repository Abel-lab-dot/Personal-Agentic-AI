<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abel Toh - AI Assistant</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WM2ZRLWR6X"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-WM2ZRLWR6X');
    </script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 600px;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 85vh;
            margin: 20px;
        }
        .header {
            background: linear-gradient(135deg, #0056b3, #004080);
            color: #fff;
            padding: 24px;
            text-align: center;
        }
        .header h3 { margin: 0; font-size: 1.4rem; }
        .header p { margin: 8px 0 0; font-size: 0.9rem; opacity: 0.9; }

        .chat-box {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            background-color: #fff;
        }
        .message {
            margin-bottom: 15px;
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 85%;
            line-height: 1.6;
            font-size: 0.95rem;
        }
        .message.user {
            background-color: #0056b3;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.bot {
            background-color: #f1f3f4;
            color: #202124;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        /* Quick Action Buttons */
        .quick-actions {
            padding: 10px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background-color: #fff;
            border-top: 1px solid #eee;
            transition: opacity 0.3s ease, visibility 0.3s;
        }
        .action-chip {
            background-color: #fff;
            border: 1px solid #0056b3;
            color: #0056b3;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        .action-chip:hover {
            background-color: #0056b3;
            color: #fff;
        }

        .input-container {
            display: flex;
            padding: 20px;
            border-top: 1px solid #eee;
            background-color: #fff;
        }
        .input-container input {
            flex-grow: 1;
            padding: 14px 20px;
            border: 1px solid #dfe1e5;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }
        .input-container input:focus { border-color: #0056b3; }
        .input-container button {
            background-color: #0056b3;
            color: #fff;
            border: none;
            padding: 0 25px;
            border-radius: 30px;
            margin-left: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .input-container button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <h3>Abel Toh - Professional AI Assistant</h3>
            <p>Digital Transformation Consultant & IT PMO</p>
        </div>
        
        <div class="chat-box" id="chat-box">
            <div class="message bot">
                Hello! I am Abel's Digital Twin. How can I help you explore my background or discuss a potential collaboration today?
            </div>
        </div>

        <div class="quick-actions" id="quick-actions">
            <button class="action-chip" onclick="handleAction('What are your top 3 AI projects?')">🚀 AI Projects</button>
            <button class="action-chip" onclick="handleAction('Tell me about your role at UniCredit')">🏦 UniCredit Role</button>
            <button class="action-chip" onclick="handleAction('What did you learn at MIT?')">🎓 MIT AI Training</button>
            <button class="action-chip" onclick="handleAction('How do I contact Abel?')">📞 Contact Info</button>
        </div>

        <div class="input-container">
            <input type="text" id="user-input" placeholder="Ask about my experience...">
            <button id="send-button">Send</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const sendButton = document.getElementById('send-button');
            const userInput = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const quickActions = document.getElementById('quick-actions');

            sendButton.addEventListener('click', sendMessage);
            
            // 🌟 IMPROVEMENT: Buttons fade away as soon as user starts typing
            userInput.addEventListener('input', () => {
                if (userInput.value.length > 0) {
                    quickActions.style.opacity = '0';
                    setTimeout(() => { 
                        if(userInput.value.length > 0) quickActions.style.display = 'none'; 
                    }, 300);
                } else {
                    quickActions.style.display = 'flex';
                    setTimeout(() => { quickActions.style.opacity = '1'; }, 10);
                }
            });

            userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

            window.handleAction = function(query) {
                userInput.value = query;
                sendMessage();
            };

            async function sendMessage() {
                const message = userInput.value.trim();
                if (message === '') return;

                // GA4 Tracking
                if (typeof gtag === 'function') {
                    gtag('event', 'ai_chat_message', { 'user_query_length': message.length });
                }

                appendMessage(message, 'user');
                userInput.value = '';
                quickActions.style.display = 'none';

                const botMessageElement = appendMessage('...', 'bot');
                
                try {
                    const response = await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: message })
                    });

                    botMessageElement.innerHTML = ''; 
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    
                    // 🌟 TYPEWRITER EFFECT LOGIC
                    let queue = "";
                    let isTyping = false;

                    async function processQueue() {
                        if (isTyping || queue.length === 0) return;
                        isTyping = true;
                        while (queue.length > 0) {
                            // Extract one character/chunk to simulate typing
                            const char = queue.charAt(0);
                            botMessageElement.innerHTML += char;
                            queue = queue.substring(1);
                            chatBox.scrollTop = chatBox.scrollHeight;
                            await new Promise(r => setTimeout(r, 15)); // Adjust speed here (15ms)
                        }
                        isTyping = false;
                    }

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        queue += decoder.decode(value, { stream: true });
                        processQueue(); 
                    }
                } catch (error) {
                    console.error('Error:', error);
                    botMessageElement.innerHTML = 'Sorry, I encountered an error. Please try again.';
                }
            }

            function appendMessage(message, sender) {
                const messageElement = document.createElement('div');
                messageElement.classList.add('message', sender);
                messageElement.innerHTML = message; 
                chatBox.appendChild(messageElement);
                chatBox.scrollTop = chatBox.scrollHeight;
                return messageElement;
            }
        });
    </script>
</body>
</html>
